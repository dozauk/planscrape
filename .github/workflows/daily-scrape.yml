name: Daily Planning Scrape

on:
  schedule:
    - cron: '0 7 * * *'   # Every day at 07:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download source
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/tarball/${{ github.sha }}" \
            | tar xz --strip-components=1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Download previous DB artifact
        run: |
          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100&name=planscrape-db" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .id // empty')
          if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
            echo "Downloading artifact $ARTIFACT_ID"
            gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > planscrape-db.zip
            unzip -o planscrape-db.zip && rm planscrape-db.zip
            echo "DB downloaded ($(wc -c < planscrape.db) bytes)"
          else
            echo "No previous DB found — starting fresh"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run scraper
        run: npm start

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planscrape-db
          path: planscrape.db
          retention-days: 90
          overwrite: true

      - name: Delete DB artifacts older than 7 days
        if: always()
        run: |
          gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100&name=planscrape-db" \
            --jq '.artifacts[] | select(.expired == false) | select(.created_at < "'$(date -d '7 days ago' --iso-8601=seconds)'") | .id' \
          | xargs -r -I{} sh -c 'gh api repos/$GITHUB_REPOSITORY/actions/artifacts/{} --method DELETE && echo "Deleted artifact {}"'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload debug snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshots
          path: debug/
          if-no-files-found: ignore

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-output/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
