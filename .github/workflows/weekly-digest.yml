name: Weekly Planning Digest

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Probe council sites
        run: |
          for url in \
            "https://twbcpa.midkent.gov.uk/online-applications/search.do?action=advanced&searchType=Application" \
            "https://pa.sevenoaks.gov.uk/online-applications/search.do?action=advanced&searchType=Application" \
            "https://planning.wealden.gov.uk/Search/Advanced"; do
            echo "--- $url"
            curl -sS --max-time 15 -o /dev/null -w "HTTP %{http_code}  time=%{time_total}s  dns=%{time_namelookup}s  connect=%{time_connect}s  ssl=%{time_appconnect}s\n" "$url" || echo "FAILED (exit $?)"
          done

      - name: Run scraper & send digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: npm start

      - name: Upload debug snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-snapshots
          path: debug/
          if-no-files-found: ignore
