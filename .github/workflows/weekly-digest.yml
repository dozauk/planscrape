name: Weekly Digest Email

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC (1h after daily scrape)
  workflow_dispatch:        # Allow manual trigger

permissions:
  actions: read

jobs:
  digest:
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Download source
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/${{ github.repository }}/tarball/${{ github.sha }}" \
            | tar xz --strip-components=1

      - name: Install dependencies
        run: npm ci

      - name: Download DB artifact
        run: |
          ARTIFACT_ID=$(gh api "repos/$GITHUB_REPOSITORY/actions/artifacts?per_page=100&name=planscrape-db" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | last | .id // empty')
          if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
            gh api "repos/$GITHUB_REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" > planscrape-db.zip
            unzip -o planscrape-db.zip && rm planscrape-db.zip
            echo "DB downloaded"
          else
            echo "No DB artifact found — cannot send digest" && exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send digest email
        run: npm run start:digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
